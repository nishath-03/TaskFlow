# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:/tmp/taskflowdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── H2 Console (view data live in browser at /h2-console) ────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA — auto-create tables from entity classes on startup ───────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT Configuration ─────────────────────────────────────────────────────────
# Secret must be at least 32 chars for HS256
jwt.secret=taskflow-super-secret-key-2024-make-it-long-enough-for-hs256
jwt.expiration=86400000

# ── CORS ──────────────────────────────────────────────────────────────────────
# Allow Vite dev server to call this API
spring.web.cors.allowed-origins=http://localhost:5173
